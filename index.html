<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Sales Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
    }
    .status {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 0.5rem 1rem;
      background: #1e293b;
      border-radius: 0.5rem;
      color: #22c55e;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Sales Arena</h1>
    <p>GHL &harr; Arena Sync API</p>
    <div class="status">API is running</div>
  </div>
</body>
</html>
