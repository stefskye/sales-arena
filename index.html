<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Sales Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .endpoints {
      text-align: left;
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
    }
    .endpoints h2 {
      font-size: 1rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .endpoint {
      padding: 0.75rem 0;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .endpoint:last-child { border-bottom: none; }
    .method {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      min-width: 50px;
      text-align: center;
    }
    .method.post { background: #065f46; color: #6ee7b7; }
    .method.get { background: #1e3a5f; color: #7dd3fc; }
    .path {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e293b;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      color: #4ade80;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Sales Arena</h1>
    <p>GHL &harr; Arena Sync API</p>
    <div class="status"><span class="status-dot"></span> API Online</div>
    <div class="endpoints">
      <h2>API Endpoints</h2>
      <div class="endpoint">
        <span class="method post">POST</span>
        <span class="path">/.netlify/functions/arena-to-ghl</span>
      </div>
      <div class="endpoint">
        <span class="method post">POST</span>
        <span class="path">/.netlify/functions/ghl-to-arena</span>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <span class="path">/.netlify/functions/ghl-pull-all</span>
      </div>
    </div>
  </div>
</body>
</html>
